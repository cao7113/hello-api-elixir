name: Elixir Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        # erlef/setup-beam only supports Ubuntu and Windows at this time
        os: [ubuntu-22.04]
        otp: [25.x]
        elixir: [1.14.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get --only prod
      - name: Make mix release
        run: |
          MIX_ENV=prod mix release
          ls -l _build
      - name: Make Github release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: _build/prod/hello_api-0.1.0.tar.gz

  deploy:
    name: Deoloy to remote server by ssh
    runs-on: ubuntu-22.04
    needs: release
    steps:
      # https://github.com/appleboy/ssh-action
      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USERNAME }}
          key: ${{ secrets.REMOTE_PRIVKEY }}
          port: 22
          script: |
            vsn=${{ github.ref_name }}
            app_root=~/hello
            mkdir -p $app_root  

            # init deploy script 
            script_path=${app_root}/deploy.sh
            script_url="https://raw.githubusercontent.com/${{ github.repository }}/main/run/deploy.sh"
            if [ ! -e $script_path ]; then
              wget -q -O $script_path $script_url
              chmod +x $script_path
              echo "setup deploy-script into ${script_path} from ${script_url}"
            fi

            $script_path $vsn $app_root bin/hello_api
