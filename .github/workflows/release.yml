name: Elixir Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        # erlef/setup-beam only supports Ubuntu and Windows at this time
        os: [ubuntu-22.04]
        otp: [25.x]
        elixir: [1.14.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get --only prod
      - name: Make mix release
        run: |
          MIX_ENV=prod mix release
          ls -l _build
      - name: Make Github release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: _build/prod/hello_api-0.1.0.tar.gz

  deploy:
    name: Deoloy to remote server by ssh
    runs-on: ubuntu-22.04
    needs: release
    steps:
      # https://github.com/appleboy/ssh-action
      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USERNAME }}
          key: ${{ secrets.REMOTE_PRIVKEY }}
          port: 22
          script: |
            echo github-tag-name=${{ github.ref_name }}
            vsn=${{ github.ref_name }}
            vsn_dir=hello/$vsn

            if [ ! -d $vsn_dir ]; then 
              mkdir -p $vsn_dir
              tarfile=hello/$vsn.tar.gz
              wget -q -O $tarfile https://github.com/cao7113/hello-api-elixir/releases/download/$vsn/hello_api-0.1.0.tar.gz 
              tar -C $vsn_dir -xzf $tarfile
              echo download $vsn app into $vsn_dir
            else 
              echo "already existed $vsn_dir"
            fi

            if [ -e hello/current ]; then
              echo try stop exist process
              hello/current/bin/hello_api stop || true
            fi

            ln -sf $vsn_dir current
            hello/current/bin/hello_api daemon_iex
            sleep 2
            hello/current/bin/hello_api pid || true
